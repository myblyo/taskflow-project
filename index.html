<!DOCTYPE html>
<html lang="es">
<!--
  TaskFlow — Página principal.
  @file index.html
  Diseño editable:
  - Título: <h1> y <title>.
  - Sidebar: clases .glass, .sidebar-progress; textos de Categorías, Prioridad, Estado.
  - Header: .content-header, .header-actions; botones Seleccionar / Borrar y toggle tema.
  - Formulario: ids (task-title, task-desc, category-select, priority-select, task-date); placeholders.
  - Fuente global: enlace a Google Fonts; la fuente se aplica en body.css (font-family).
  No eliminar ids/classes que usa app.js (task-list, progressPercent, progressFill, progressCount, selectModeBtn, deleteSelectedBtn, darkToggle, resetBtn, task-form, f-cat, f-pri, f-sta).
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de tareas</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    @import url("Componentes/style.css");
</style>
</head>
<body>

<main>
    <!-- Sidebar -->
    <aside class="glass">
        <div class="sidebar-progress" aria-label="Progreso de tareas">
            <div class="sidebar-progress-percent" id="progressPercent">0%</div>
            <div class="sidebar-progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                <div class="sidebar-progress-fill" id="progressFill"></div>
            </div>
            <div class="sidebar-progress-count" id="progressCount">0/0 tareas</div>
        </div>
        <button type="button" id="resetBtn">🗑 filtros</button>

        <details open>
            <summary>Categorías</summary>
            <label class="checkbox-label"><input type="checkbox" class="checkbox f-cat" value="Trabajo"> Trabajo</label>
            <label class="checkbox-label"><input type="checkbox" class="checkbox f-cat" value="Estudio"> Estudio</label>
            <label class="checkbox-label"><input type="checkbox" class="checkbox f-cat" value="Personal"> Personal</label>
            <label class="checkbox-label"><input type="checkbox" class="checkbox f-cat" value="Otro"> Otro</label>
        </details>

        <details open>
            <summary>Prioridad</summary>
            <label class="checkbox-label"><input type="checkbox" class="checkbox f-pri" value="Alto"> Alto</label>
            <label class="checkbox-label"><input type="checkbox" class="checkbox f-pri" value="Medio"> Medio</label>
            <label class="checkbox-label"><input type="checkbox" class="checkbox f-pri" value="Bajo"> Bajo</label>
        </details>

        <details open>
            <summary>Estado</summary>
            <label class="checkbox-label filter-sta-pendiente"><input type="checkbox" class="checkbox f-sta" value="Pendiente"> Pendiente</label>
            <label class="checkbox-label filter-sta-progreso"><input type="checkbox" class="checkbox f-sta" value="En progreso"> En progreso</label>
            <label class="checkbox-label filter-sta-completada"><input type="checkbox" class="checkbox f-sta" value="Completada"> Completada</label>
        </details>
    </aside>

    <!-- Content -->
    <div class="content">
        <div class="content-header">
            <h1>Lista de tareas</h1>
            <div class="header-actions">
                <button type="button" class="header-btn" id="selectModeBtn">Seleccionar</button>
                <button type="button" class="header-btn header-btn--danger" id="deleteSelectedBtn" title="Borrar seleccionadas" aria-label="Borrar tareas seleccionadas" disabled>🗑</button>
                <input class="theme-checkbox" type="checkbox" id="darkToggle" aria-label="Cambiar a modo oscuro" />
            </div>
        </div>


        <form class="glass" id="task-form" novalidate>
            <div class="row">
                <input type="text" id="task-title" name="title" placeholder="Título de la tarea" class="flex-1" required minlength="1" maxlength="80">
                <select id="category-select" name="category" required>
                    <option value="" disabled selected>Categoría</option>
                    <option value="Trabajo">Trabajo</option>
                    <option value="Estudio">Estudio</option>
                    <option value="Personal">Personal</option>
                    <option value="Otro">Otro</option>
                </select>
                <select id="priority-select" name="priority" required>
                    <option value="" disabled selected>Prioridad</option>
                    <option value="Alto">Alto</option>
                    <option value="Medio">Medio</option>
                    <option value="Bajo">Bajo</option>
                </select>
            </div>
            <div class="row">
                <input type="text" id="task-desc" name="description" placeholder="Descripción (opcional)" class="flex-1" maxlength="240">
                <input
                  type="text"
                  id="task-date"
                  name="dueDate"
                  placeholder="DDMMAAAA (solo números)"
                  pattern="\\d{2}-\\d{2}-\\d{4}"
                  inputmode="numeric"
                  required>
                <button type="submit">+ Agregar tarea</button>
            </div>
        </form>

        <div id="task-list"></div>
    </div>
</main>

<script src="js/app.js"></script>
</body>
</html>
